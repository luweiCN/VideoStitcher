name: 发布桌面客户端到 TOS
run-name: 发布桌面客户端 v${{ inputs.version }} · ${{ inputs.release_request_id || 'manual' }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: '待发布版本，必须与 package.json 一致，例如 2.9.0'
        required: true
        type: string
      release_notes_override:
        description: '可选：人工覆盖 AI 自动生成的更新说明；通常留空'
        required: false
        default: ''
        type: string
      release_request_id:
        description: '管理后台生成的发布请求编号；人工发布时留空'
        required: false
        default: ''
        type: string
  workflow_call:
    inputs:
      version:
        description: '待发布版本，必须与 package.json 一致'
        required: true
        type: string
      release_notes_override:
        description: '可选：人工覆盖 AI 自动生成的更新说明'
        required: false
        default: ''
        type: string
      release_request_id:
        description: '管理后台生成的发布请求编号'
        required: false
        default: ''
        type: string
      publish_github_bridge:
        description: '是否同时发布一次性 GitHub 桥接 Release'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  models: read

concurrency:
  group: desktop-release
  cancel-in-progress: false

env:
  NODE_VERSION: '22'

jobs:
  verify:
    name: 发布前验证
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: desktop-release
    env:
      VIDEO_STITCHER_LICENSE_API_URL: ${{ vars.VIDEO_STITCHER_LICENSE_API_URL }}
      VIDEO_STITCHER_LICENSE_SIGNING_PUBLIC_KEY_BASE64: ${{ secrets.VIDEO_STITCHER_LICENSE_SIGNING_PUBLIC_KEY_BASE64 }}
      VIDEO_STITCHER_UPDATE_BASE_URL: ${{ vars.VIDEO_STITCHER_UPDATE_BASE_URL }}

    steps:
      - name: 检出固定提交
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: 设置 Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 校验版本
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          node -e "const version=process.env.RELEASE_VERSION; if (!/^\\d+\\.\\d+\\.\\d+(?:-[0-9A-Za-z.-]+)?$/.test(version)) throw new Error('版本号格式无效'); if (require('./package.json').version !== version) throw new Error('输入版本与 package.json 不一致')"

      - name: 收集版本提交
        run: node scripts/prepare-release-notes.mjs --mode=collect --version=${{ inputs.version }} --output-directory=.release

      - name: AI 整理用户更新说明
        id: ai_release_notes
        if: ${{ inputs.release_notes_override == '' }}
        continue-on-error: true
        uses: actions/ai-inference@a7805884c80886efc241e94a5351df715968a0ad # v2.1.1
        with:
          prompt-file: .release/release-notes-source.txt
          system-prompt-file: .github/prompts/release-notes-system.txt
          model: ${{ vars.RELEASE_NOTES_AI_MODEL || 'openai/gpt-4o' }}
          max-completion-tokens: 800
          temperature: 0.1

      - name: 确定最终更新说明
        env:
          RELEASE_NOTES_OVERRIDE: ${{ inputs.release_notes_override }}
          AI_RELEASE_NOTES_FILE: ${{ steps.ai_release_notes.outputs['response-file'] }}
        run: |
          node scripts/prepare-release-notes.mjs \
            --mode=finalize \
            --version=${{ inputs.version }} \
            --output-directory=.release \
            --override-env=RELEASE_NOTES_OVERRIDE \
            --ai-response-file-env=AI_RELEASE_NOTES_FILE
          node scripts/update-manifest-release-notes.mjs \
            --check-notes \
            --release-notes-file=.release/release-notes.txt

      - name: 测试发布脚本
        run: npm run test:release-scripts

      - name: 测试渲染进程安全配置
        run: npm run test:renderer-security

      - name: 测试客户端更新状态
        run: npm run test:update-state

      - name: 校验桥接版本高于 GitHub 当前正式版
        if: ${{ inputs.publish_github_bridge }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          LATEST_TAG="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name')"
          LATEST_VERSION="${LATEST_TAG#v}"
          export LATEST_VERSION
          node <<'NODE'
          const parseVersion = (value, label) => {
            if (!/^\d+\.\d+\.\d+$/.test(value)) {
              throw new Error(`${label}必须是稳定语义化版本：${value}`);
            }
            return value.split('.').map(Number);
          };

          const current = parseVersion(process.env.RELEASE_VERSION ?? '', '桥接版本');
          const latest = parseVersion(process.env.LATEST_VERSION ?? '', 'GitHub 当前版本');
          const comparison = current.findIndex((part, index) => part !== latest[index]);
          if (comparison === -1 || current[comparison] < latest[comparison]) {
            throw new Error(`桥接版本必须高于 GitHub 当前版本 ${process.env.LATEST_VERSION}`);
          }
          console.log(`[发布检查] 桥接版本 ${process.env.RELEASE_VERSION} 高于 GitHub 当前版本 ${process.env.LATEST_VERSION}`);
          NODE

      - name: 安装桌面端依赖
        run: npm ci

      - name: 检查桌面端生产依赖严重漏洞
        run: npm audit --omit=dev --audit-level=high --registry=https://registry.npmjs.org

      - name: 校验正式构建配置
        run: npm run verify:license-release-config

      - name: 检查桌面端类型
        run: npm run typecheck

      - name: 构建桌面端
        run: npm run build

      - name: 安装授权服务依赖
        run: npm ci --prefix services/license-server --ignore-scripts

      - name: 测试授权服务
        run: npm test --prefix services/license-server

      - name: 上传本次版本说明
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-notes
          if-no-files-found: error
          retention-days: 3
          path: |
            .release/release-notes.txt
            .release/release-notes.json

  build-macos:
    name: 构建 macOS（临时签名）
    needs: verify
    runs-on: macos-latest
    timeout-minutes: 45
    environment: desktop-release
    env:
      VIDEO_STITCHER_LICENSE_API_URL: ${{ vars.VIDEO_STITCHER_LICENSE_API_URL }}
      VIDEO_STITCHER_LICENSE_SIGNING_PUBLIC_KEY_BASE64: ${{ secrets.VIDEO_STITCHER_LICENSE_SIGNING_PUBLIC_KEY_BASE64 }}
      VIDEO_STITCHER_UPDATE_BASE_URL: ${{ vars.VIDEO_STITCHER_UPDATE_BASE_URL }}
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: 检出固定提交
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 设置 Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建临时签名安装包
        run: npm run dist:mac

      - name: 验证临时签名
        run: |
          APP_PATH="$(find dist -type d -name 'VideoStitcher.app' -print -quit)"
          test -n "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          SIGNATURE_INFO="$(codesign -dv --verbose=4 "$APP_PATH" 2>&1)"
          echo "$SIGNATURE_INFO"
          echo "$SIGNATURE_INFO" | grep -F 'Signature=adhoc'
          REQUIREMENT_INFO="$(codesign -d -r- "$APP_PATH" 2>&1)"
          echo "$REQUIREMENT_INFO"
          echo "$REQUIREMENT_INFO" | grep -F 'identifier "com.videostitcher.app"'

      - name: 上传 macOS 产物
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: macos-build
          if-no-files-found: error
          retention-days: 3
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml

  build-windows:
    name: 构建 Windows（未签名）
    needs: verify
    runs-on: windows-latest
    timeout-minutes: 45
    environment: desktop-release
    env:
      VIDEO_STITCHER_LICENSE_API_URL: ${{ vars.VIDEO_STITCHER_LICENSE_API_URL }}
      VIDEO_STITCHER_LICENSE_SIGNING_PUBLIC_KEY_BASE64: ${{ secrets.VIDEO_STITCHER_LICENSE_SIGNING_PUBLIC_KEY_BASE64 }}
      VIDEO_STITCHER_UPDATE_BASE_URL: ${{ vars.VIDEO_STITCHER_UPDATE_BASE_URL }}
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: 检出固定提交
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 设置 Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建未签名安装包
        run: npm run dist:win

      - name: 验证未签名安装包
        shell: pwsh
        run: |
          $installers = Get-ChildItem dist -Filter *.exe
          if ($installers.Count -eq 0) { throw '没有找到 Windows 安装包' }
          foreach ($installer in $installers) {
            $signature = Get-AuthenticodeSignature $installer.FullName
            if ($signature.Status -ne 'NotSigned') {
              throw "安装包签名状态与免费发布配置不符：$($installer.Name)，状态：$($signature.Status)"
            }
          }

      - name: 上传 Windows 产物
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-build
          if-no-files-found: error
          retention-days: 3
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml

  publish-tos:
    name: 发布到 TOS
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: desktop-release
    env:
      TOS_UPDATE_ACCESS_KEY_ID: ${{ secrets.TOS_UPDATE_ACCESS_KEY_ID }}
      TOS_UPDATE_SECRET_ACCESS_KEY: ${{ secrets.TOS_UPDATE_SECRET_ACCESS_KEY }}
      TOS_UPDATE_SESSION_TOKEN: ${{ secrets.TOS_UPDATE_SESSION_TOKEN }}
      TOS_UPDATE_REGION: ${{ vars.TOS_UPDATE_REGION }}
      TOS_UPDATE_ENDPOINT: ${{ vars.TOS_UPDATE_ENDPOINT }}
      TOS_UPDATE_BUCKET: ${{ vars.TOS_UPDATE_BUCKET }}
      TOS_UPDATE_PREFIX: ${{ vars.TOS_UPDATE_PREFIX }}
      VIDEO_STITCHER_UPDATE_BASE_URL: ${{ vars.VIDEO_STITCHER_UPDATE_BASE_URL }}

    steps:
      - name: 检出固定提交
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 设置 Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/license-server/package-lock.json

      - name: 下载 macOS 产物
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: macos-build
          path: artifacts/macos

      - name: 下载 Windows 产物
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: windows-build
          path: artifacts/windows

      - name: 下载本次版本说明
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-notes
          path: artifacts/release

      - name: 安装 TOS 发布依赖
        run: npm ci --prefix services/license-server --ignore-scripts

      - name: 将更新说明写入两端清单
        run: node scripts/update-manifest-release-notes.mjs --version=${{ inputs.version }} --release-notes-file=artifacts/release/release-notes.txt artifacts/macos artifacts/windows

      - name: 校验更新清单与安装包
        run: node scripts/verify-update-artifacts.mjs --version=${{ inputs.version }} --release-notes-file=artifacts/release/release-notes.txt artifacts/macos artifacts/windows

      - name: 保存已写入更新说明的桥接产物
        if: ${{ inputs.publish_github_bridge }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bridge-release-build
          if-no-files-found: error
          retention-days: 3
          path: |
            artifacts/macos
            artifacts/windows

      - name: 检查 TOS 更新桶权限
        run: node services/license-server/scripts/publish-updates-to-tos.mjs --check

      - name: 按 pointer-last 顺序同步到 TOS
        run: |
          node services/license-server/scripts/publish-updates-to-tos.mjs \
            --release-version=${{ inputs.version }} \
            --release-metadata=artifacts/release/release-notes.json \
            artifacts/macos artifacts/windows

      - name: 验证公网清单与差分下载
        run: node scripts/verify-public-update-source.mjs --base-url-env=VIDEO_STITCHER_UPDATE_BASE_URL --version=${{ inputs.version }} --release-notes-file=artifacts/release/release-notes.txt

      - name: 写入发布摘要
        run: |
          echo "### 桌面客户端发布完成" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- 版本：\`v${{ inputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- 更新源：仅使用 TOS，channel manifest 最后发布" >> "$GITHUB_STEP_SUMMARY"

  tag-release:
    name: 创建私有版本标签
    if: ${{ !inputs.publish_github_bridge }}
    needs: publish-tos
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: v${{ inputs.version }}

    steps:
      - name: 创建不可变发布边界
        run: |
          EXISTING_SHA="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" --jq '.object.sha' 2>/dev/null || true)"
          if [ -n "$EXISTING_SHA" ]; then
            if [ "$EXISTING_SHA" != "$GITHUB_SHA" ]; then
              echo "Git 标签 ${RELEASE_TAG} 已指向其他提交，禁止覆盖。"
              exit 1
            fi
            echo "Git 标签 ${RELEASE_TAG} 已指向本次提交，跳过重复创建。"
            exit 0
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f ref="refs/tags/${RELEASE_TAG}" \
            -f sha="${GITHUB_SHA}"
          echo "已创建私有版本标签 ${RELEASE_TAG}。"

  publish-github-bridge:
    name: 发布一次性 GitHub 桥接版本
    if: ${{ inputs.publish_github_bridge }}
    needs: publish-tos
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: desktop-release
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      RELEASE_TAG: v${{ inputs.version }}

    steps:
      - name: 下载与 TOS 完全相同的桥接产物
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: bridge-release-build
          path: artifacts

      - name: 下载与 TOS 完全相同的版本说明
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-notes
          path: artifacts/release

      - name: 拒绝覆盖已有标签或 Release
        run: |
          if gh release view "$RELEASE_TAG" > /dev/null 2>&1; then
            echo "GitHub Release ${RELEASE_TAG} 已存在，禁止覆盖。"
            exit 1
          fi
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" > /dev/null 2>&1; then
            echo "Git 标签 ${RELEASE_TAG} 已存在，禁止改变标签指向。"
            exit 1
          fi

      - name: 发布同一批桥接产物到 GitHub Release
        run: |
          mapfile -d '' -t release_files < <(find artifacts/macos artifacts/windows -maxdepth 1 -type f -print0)
          if [ "${#release_files[@]}" -eq 0 ]; then
            echo "没有找到可发布的桥接产物。"
            exit 1
          fi

          gh release create "$RELEASE_TAG" "${release_files[@]}" \
            --target "$GITHUB_SHA" \
            --title "VideoStitcher ${RELEASE_TAG}" \
            --notes-file artifacts/release/release-notes.txt \
            --latest

          local_count="${#release_files[@]}"
          remote_count="$(gh release view "$RELEASE_TAG" --json assets --jq '.assets | length')"
          if [ "$local_count" -ne "$remote_count" ]; then
            echo "GitHub Release 资产数量不一致：本地 ${local_count}，远端 ${remote_count}。"
            exit 1
          fi

          is_draft="$(gh release view "$RELEASE_TAG" --json isDraft --jq '.isDraft')"
          if [ "$is_draft" != "false" ]; then
            echo "GitHub Release 仍处于草稿状态。"
            exit 1
          fi
          echo "GitHub 桥接 Release 发布完成。"

      - name: 写入桥接发布摘要
        run: |
          echo "### GitHub 桥接版本发布完成" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- 版本：\`${RELEASE_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- 构建产物：与已发布到 TOS 的 Actions Artifacts 完全相同" >> "$GITHUB_STEP_SUMMARY"
          echo "- 客户端运行时更新源：仅使用 TOS" >> "$GITHUB_STEP_SUMMARY"
