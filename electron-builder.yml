# electron-builder 配置
# 支持自动更新的跨平台构建配置

appId: com.videostitcher.app
productName: VideoStitcher
directories:
  buildResources: build
  output: dist

# 应用图标配置（不带扩展名，electron-builder 会自动查找对应格式）
icon: build/icon

# 发布配置（用于自动更新）
publish:
  provider: generic
  url: ${env.VIDEO_STITCHER_UPDATE_BASE_URL}

# 文件包含/排除（明确指定要打包进 asar 的文件）
# out/ 目录包含编译后的主进程、预加载脚本和渲染进程
files:
  - out/**/*
  - build/icon.png
  - bin/whisper.cpp*/**/*
  - package.json
  - node_modules/**/*
  - "!**/.vscode/*"
  - "!**/.git/*"
  - "!**/.github/*"
  - "!src/**/*"
  - "!**/.gitignore"
  - "!**/.eslintrc*"
  - "!**/README.md"
  - "!**/CLAUDE.md"

# asar 打包配置
asarUnpack:
  - node_modules/ffmpeg-static/**/*
  - node_modules/sharp/**/*
  - node_modules/@img/**/*
  - node_modules/@ffprobe-installer/**/*
  - node_modules/electron-log/**/*
  - node_modules/systeminformation/**/*
  - node_modules/pidusage/**/*
  - node_modules/better-sqlite3/**/*
  - bin/whisper.cpp*/**/*

# 收紧正式包运行时，避免通过 NODE_OPTIONS、调试参数或外置 app 目录替换主进程代码。
electronFuses:
  # 图片 worker 当前通过 process.fork 启动，必须保留 ELECTRON_RUN_AS_NODE；其余注入入口仍关闭。
  runAsNode: true
  enableCookieEncryption: true
  enableNodeOptionsEnvironmentVariable: false
  enableNodeCliInspectArguments: false
  enableEmbeddedAsarIntegrityValidation: true
  onlyLoadAppFromAsar: true

# macOS 配置 - DMG 用于手动安装，ZIP 用于自动更新
mac:
  category: public.app-category.video
  target:
    - target: dmg      # 手动安装
      arch:
        - x64
        - arm64
    - target: zip      # 自动更新需要
      arch:
        - x64
        - arm64
  gatekeeperAssess: false
  hardenedRuntime: true
  notarize: true
  # 确保 ZIP 包中的应用正确签名
  extendInfo:
    - NSCameraUsageDescription: 需要访问摄像头以进行视频处理
    - NSMicrophoneUsageDescription: 需要访问麦克风以进行音频处理
    - NSDocumentsFolderUsageDescription: 需要访问文档以处理视频文件

# Windows 配置 - 只生成 NSIS 安装包
win:
  target:
    - target: nsis
      arch:
        - x64

# NSIS 安装程序配置
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: VideoStitcher
  artifactName: ${productName}-${version}-${arch}.${ext}
  deleteAppDataOnUninstall: false

# Linux 配置
linux:
  category: Video
  target:
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64
    - target: AppImage
      arch:
        - x64

# DMG 配置
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380
